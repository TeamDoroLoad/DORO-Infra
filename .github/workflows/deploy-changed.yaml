# deploy-changed.yaml
# main에 push된 커밋에서 CICD/ 아래 "변경된 yaml 파일만" 골라 kubectl apply 하는 워크플로우.
# (전체 kustomization을 매번 재적용하지 않고, 이번 push로 실제 바뀐 리소스만 건드리기 위함)
#
# *** 반드시 지켜야 하는 안전장치 ***
# backend-deployment.yaml의 image는 git에 IMAGE_REPO_PLACEHOLDER로 고정돼 있고, 실제 이미지는
# DORO-Service의 service_deloy.yaml이 배포 때마다 `kubectl set image`로 라이브 Deployment에만 주입한다
# (git에는 절대 반영되지 않음). 따라서 backend-deployment.yaml이 이미지와 무관한 이유로 수정되어
# 이 워크플로우가 그대로 kubectl apply 하면, 정상 서비스 중이던 Pod의 image가 placeholder로
# 되돌아가 ErrImagePull이 발생한다. 이를 막기 위해 apply 직전에 현재 라이브 image를 캡처해두고,
# apply 직후 그 값을 다시 주입해 되돌린다.
#
# *** 사전 조건 ***
# IAM 사용자 cld-team2-doro-github-action이 클러스터 team-2-doro-load-cluster의 EKS access entry로
# 등록되어 있어야 kubectl 명령이 동작한다 (DORO-Service/.github/workflows/service_deloy.yaml과 동일 조건).

name: Deploy Changed Infra Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'CICD/*.yaml'

env:
  AWS_REGION: ap-northeast-2
  CLUSTER_NAME: team-2-doro-load-cluster

jobs:
  apply-changed:
    name: Apply changed CICD manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 이전 커밋과의 diff 계산을 위해 전체 히스토리 필요

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS cluster
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Determine changed CICD yaml files
        id: diff
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          # 새 브랜치 최초 push 등 이전 커밋이 없는 경우의 fallback
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          if [ -z "$BEFORE_SHA" ]; then
            RAW_DIFF=$(git show --name-status --diff-filter=ACMR --format= -- 'CICD/*.yaml')
          else
            RAW_DIFF=$(git diff --name-status --diff-filter=ACMR "$BEFORE_SHA" "${{ github.sha }}" -- 'CICD/*.yaml')
          fi
          CHANGED_FILES=$(echo "$RAW_DIFF" | awk 'NF{print $2}')

          # 삭제된 파일은 apply 대상에서 자동 제외되므로, 클러스터에 orphan 리소스로 남을 수 있음을 경고만 남긴다
          if [ -z "$BEFORE_SHA" ]; then
            DELETED_FILES=$(git show --name-status --diff-filter=D --format= -- 'CICD/*.yaml' | awk 'NF{print $2}')
          else
            DELETED_FILES=$(git diff --name-status --diff-filter=D "$BEFORE_SHA" "${{ github.sha }}" -- 'CICD/*.yaml' | awk 'NF{print $2}')
          fi
          if [ -n "$DELETED_FILES" ]; then
            echo "::warning::다음 파일이 삭제됐지만 자동으로 클러스터에서 제거되지 않습니다 (수동 kubectl delete 필요): $DELETED_FILES"
          fi

          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Capture current live image (deployment safety net)
        id: image_guard
        if: contains(steps.diff.outputs.files, 'CICD/backend-deployment.yaml')
        run: |
          CURRENT_IMAGE=$(kubectl get deployment doro-app -n default -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
          echo "current_image=$CURRENT_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Apply changed manifests in dependency order
        if: steps.diff.outputs.files != ''
        run: |
          # kustomization.yaml에 정의된 리소스 순서(SA/SecretProviderClass가 Deployment보다 먼저,
          # IngressClass가 Ingress보다 먼저 존재해야 함)를 그대로 따른다.
          ORDERED_FILES="CICD/serviceaccount.yaml CICD/secret-provider-class.yaml CICD/backend-deployment.yaml CICD/backend-service.yaml CICD/ingressclass.yaml CICD/backend-ingress.yaml CICD/backend-pdb.yaml"
          CHANGED_FILES="${{ steps.diff.outputs.files }}"

          for f in $ORDERED_FILES; do
            if echo "$CHANGED_FILES" | grep -qx "$f"; then
              echo "Applying $f"
              kubectl apply -f "$f"
            fi
          done

      - name: Restore live image if backend-deployment.yaml was reapplied
        if: steps.image_guard.outputs.current_image != '' && steps.image_guard.outputs.current_image != 'IMAGE_REPO_PLACEHOLDER'
        run: |
          kubectl set image deployment/doro-app doro-app="${{ steps.image_guard.outputs.current_image }}" -n default

      - name: Wait for rollout if Deployment changed
        if: contains(steps.diff.outputs.files, 'CICD/backend-deployment.yaml')
        run: kubectl rollout status deployment/doro-app -n default --timeout=180s
