# secret-provider-class.yaml
# AWS Secrets Manager의 시크릿 값을 Kubernetes Secret(doro-secret)으로 동기화하기 위한
# SecretProviderClass. Secrets Store CSI Driver + AWS Provider (helm release: csi-secrets-store,
# secrets-provider-aws, 둘 다 kube-system에 이미 설치됨 — 2026-07-22 확인)가 이 리소스를 해석한다.
#
# 동작 방식: secretObjects는 "누군가 이 SecretProviderClass를 CSI 볼륨으로 마운트해야" 실제로
# doro-secret K8s Secret을 생성/동기화한다. 즉 backend-deployment.yaml의 Pod가 아래 objectName들이
# 참조하는 AWS Secrets Manager 시크릿(team2/doro-load/secrets)을 CSI 볼륨으로 마운트해야만
# doro-secret이 실제로 만들어진다 (파일 마운트를 안 쓰더라도 볼륨 마운트 자체는 필요).
#
# Redis는 자체 운영 컨테이너(doro-redis)가 아니라 AWS ElastiCache로 전환됐고 AUTH(비밀번호) 없이
# 접근하므로, redis-password 대신 엔드포인트 정보(REDIS_HOST/REDIS_PORT)를 시크릿으로 주입한다.
#
# *** 시크릿 키 표준화 (2026-07-24) ***
# 기존 kebab-case(redis-host 등) 키를 실제 주입되는 env var 이름과 1:1로 맞춰 SCREAMING_SNAKE_CASE
# 최상위(flat) 키로 통일했다 — 필드명에 하이픈이 없어 예전에 겪었던 "Invalid JMES Path: redis-host"
# 이스케이프 문제(하이픈이 JMESPath에서 뺄셈 연산자 토큰으로 해석됨)가 이 구조에서는 발생하지 않는다.
#
# *** AWS Secrets Manager 시크릿 구조 (2026-07-24 실제 적용값, 콘솔에서 확인) ***
#   {
#     "RDS_HOST": "...",
#     "RDS_PORT": "3306",
#     "DB_USERNAME": "...",
#     "DB_PASSWORD": "...",
#     "RDS_DBNAME": "...",
#     "REDIS_HOST": "...",
#     "REDIS_PORT": "...",
#     "PUBLIC_DATA_API_KEY": "...",
#     "TMAP_APP_KEY": "..."
#   }
# 전부 최상위 키이며 중첩 없음 (초안에서 "rds" 하위로 중첩하는 안을 검토했으나, 실제로는
# 콘솔에 이미 최상위 9개 키로 등록되어 있어 그에 맞췄다).

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: doro-secret-provider
  namespace: default
  labels:
    project: doro-load
    team: team-a
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "team2/doro-load/secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: RDS_HOST
            objectAlias: RDS_HOST
          - path: RDS_PORT
            objectAlias: RDS_PORT
          - path: DB_USERNAME
            objectAlias: DB_USERNAME
          - path: DB_PASSWORD
            objectAlias: DB_PASSWORD
          - path: RDS_DBNAME
            objectAlias: RDS_DBNAME
          - path: REDIS_HOST
            objectAlias: REDIS_HOST
          - path: REDIS_PORT
            objectAlias: REDIS_PORT
          - path: PUBLIC_DATA_API_KEY
            objectAlias: PUBLIC_DATA_API_KEY
          - path: TMAP_APP_KEY
            objectAlias: TMAP_APP_KEY
  secretObjects:
  - secretName: doro-secret          # backend-deployment.yaml의 secretKeyRef.name과 일치해야 함
    type: Opaque
    data:
    - objectName: RDS_HOST
      key: RDS_HOST
    - objectName: RDS_PORT
      key: RDS_PORT
    - objectName: DB_USERNAME
      key: DB_USERNAME
    - objectName: DB_PASSWORD
      key: DB_PASSWORD
    - objectName: RDS_DBNAME
      key: RDS_DBNAME
    - objectName: REDIS_HOST
      key: REDIS_HOST
    - objectName: REDIS_PORT
      key: REDIS_PORT
    - objectName: PUBLIC_DATA_API_KEY
      key: PUBLIC_DATA_API_KEY
    - objectName: TMAP_APP_KEY
      key: TMAP_APP_KEY
