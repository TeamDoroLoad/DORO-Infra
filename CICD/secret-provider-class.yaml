# secret-provider-class.yaml
# AWS Secrets Manager의 시크릿 값을 Kubernetes Secret(doro-secret)으로 동기화하기 위한
# SecretProviderClass. Secrets Store CSI Driver + AWS Provider (helm release: csi-secrets-store,
# secrets-provider-aws, 둘 다 kube-system에 이미 설치됨 — 2026-07-22 확인)가 이 리소스를 해석한다.
#
# 동작 방식: secretObjects는 "누군가 이 SecretProviderClass를 CSI 볼륨으로 마운트해야" 실제로
# doro-secret K8s Secret을 생성/동기화한다. 즉 backend-deployment.yaml의 Pod가 아래 objectName들이
# 참조하는 AWS Secrets Manager 시크릿(team2/doro-load/secrets)을 CSI 볼륨으로 마운트해야만
# doro-secret이 실제로 만들어진다 (파일 마운트를 안 쓰더라도 볼륨 마운트 자체는 필요).
#
# Redis는 자체 운영 컨테이너(doro-redis)가 아니라 AWS ElastiCache로 전환됐고 AUTH(비밀번호) 없이
# 접근하므로, redis-password 대신 엔드포인트 정보(redis-host/redis-port)를 시크릿으로 주입한다.
#
# *** AWS Secrets Manager 시크릿 구조 (이미 생성/편집 완료 — 2026-07-22) ***
#   {
#     "redis-host": "...",
#     "redis-port": "...",
#     "mysql-username": "...",
#     "mysql-password": "...",
#     "public-data-api-key": "...",
#     "tmap-app-key": "..."
#   }

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: doro-secret-provider
  namespace: default
  labels:
    project: doro-load
    team: team-a
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "team2/doro-load/secrets"
        objectType: "secretsmanager"
        # JMESPath 원시 식별자는 하이픈을 허용하지 않아 이스케이프한 큰따옴표로 감싸야 함
        # ("Invalid JMES Path: redis-host" 에러로 실제 재현 확인 — 2026-07-22)
        jmesPath:
          - path: "\"redis-host\""
            objectAlias: "redis-host"
          - path: "\"redis-port\""
            objectAlias: "redis-port"
          - path: "\"mysql-username\""
            objectAlias: "mysql-username"
          - path: "\"mysql-password\""
            objectAlias: "mysql-password"
          - path: "\"public-data-api-key\""
            objectAlias: "public-data-api-key"
          - path: "\"tmap-app-key\""
            objectAlias: "tmap-app-key"
  secretObjects:
  - secretName: doro-secret          # backend-deployment.yaml의 secretKeyRef.name과 일치해야 함
    type: Opaque
    data:
    - objectName: "redis-host"
      key: redis-host
    - objectName: "redis-port"
      key: redis-port
    - objectName: "mysql-username"
      key: mysql-username
    - objectName: "mysql-password"
      key: mysql-password
    - objectName: "public-data-api-key"
      key: public-data-api-key
    - objectName: "tmap-app-key"
      key: tmap-app-key
