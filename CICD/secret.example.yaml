# secret.example.yaml
# DORO Load 애플리케이션이 사용하는 민감 정보(비밀번호/키)의 템플릿.
# 이 파일 자체는 "입력 필요" 자리표시자만 있어서 커밋해도 안전하다 (.env.example과 같은 역할).
#
# *** 운영 클러스터: 더 이상 이 경로를 쓰지 않음 (2026-07-22부터) ***
# doro-secret은 이제 AWS Secrets Manager(team2/doro-load/secrets) + Secrets Store CSI Driver
# (CICD/secret-provider-class.yaml, CICD/serviceaccount.yaml)가 자동 생성한다.
# secretKeyRef 참조는 doro-secret이라는 이름만 유지되면 되므로 deployment 쪽은 수정할 필요 없었다.
#
# *** 이 파일이 남아있는 이유: 로컬(docker-desktop) 테스트 전용 ***
# 로컬 클러스터에는 IRSA/AWS Secrets Manager 접근이 없으므로, 로컬 테스트 시에만 아래 절차를 쓴다.
# 1. 이 파일을 CICD/secret.yaml로 복사한다 (그 이름은 .gitignore에 등록돼 있어 커밋되지 않음).
# 2. secret.yaml에 실제 값을 채운다.
# 3. `kubectl apply -f CICD/secret.yaml` (로컬 kustomization 실행 전 별도로 적용 — kustomization.yaml의
#    resources 목록에는 이제 secret.yaml이 없고 secret-provider-class.yaml이 대신 들어있음).

apiVersion: v1
kind: Secret
metadata:
  name: doro-secret            # 다른 매니페스트(backend-deployment.yaml)의 secretKeyRef.name과 일치해야 함
  namespace: default
  labels:
    project: doro-load
    team: team-a
type: Opaque
stringData:
  # --- RDS (AWS RDS 사용, 로컬 테스트는 중첩 없이 평탄한 키로 유지) ---
  RDS_HOST: "입력 필요"
  RDS_PORT: "입력 필요"
  DB_USERNAME: "입력 필요"
  DB_PASSWORD: "입력 필요"
  RDS_DBNAME: "입력 필요"

  # --- Redis (AWS ElastiCache, AUTH 미사용 — host/port만 주입) ---
  REDIS_HOST: "입력 필요"
  REDIS_PORT: "입력 필요"

  # --- 외부 데이터 API ---
  PUBLIC_DATA_API_KEY: "입력 필요"      # 공공데이터포털 발급 API 키 (현재 DORO-BACK 코드는 미사용, 향후 수집기용 예약)
  TMAP_APP_KEY: "입력 필요"             # TMAP appKey — Web SDK/REST API 공용
