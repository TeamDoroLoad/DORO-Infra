# secret.example.yaml
# DORO Load 애플리케이션이 사용하는 민감 정보(비밀번호/키)의 템플릿. DORO-Infra/secret.yaml과 동일한 스펙이다.
# 이 파일 자체는 "입력 필요" 자리표시자만 있어서 커밋해도 안전하다 (.env.example과 같은 역할).
#
# *** 사용법 ***
# 1. 이 파일을 CICD/secret.yaml로 복사한다 (그 이름은 .gitignore에 등록돼 있어 커밋되지 않음).
# 2. secret.yaml에 실제 값을 채운다.
# 3. 클러스터 관리자가 로컬에서 직접 `kubectl apply -f CICD/secret.yaml`로 적용한다.
#    CI(deloy.yaml)는 push마다 이 파일을 apply하지 않는다 — Secret은 값이 거의 안 바뀌므로 수동 절차로 둔다.
# 값 확정 후에는 AWS Secrets Manager + External Secrets Operator로 전환 예정
# (DORO-Infra/SECRETS_MANAGER_GUIDE.md 참고 — IAM Role/Secrets Manager 시크릿 준비되면 이 파일 대신
#  DORO-Infra/secret-store.yaml + external-secret.yaml을 적용하는 방식으로 교체한다. secretKeyRef 참조는
#  doro-secret이라는 이름만 유지되면 되므로 deployment 쪽은 수정할 필요 없음).

apiVersion: v1
kind: Secret
metadata:
  name: doro-secret            # 다른 매니페스트(backend-deployment.yaml, redis-deployment.yaml)의 secretKeyRef.name과 일치해야 함
  namespace: default
  labels:
    project: doro-load
    team: team-a
type: Opaque
stringData:
  # --- Redis (doro-redis, redis-deployment.yaml --requirepass 값으로 사용) ---
  redis-password: "입력 필요"

  # --- MySQL (AWS RDS 사용) ---
  mysql-username: "입력 필요"
  mysql-password: "입력 필요"

  # --- 외부 데이터 API ---
  public-data-api-key: "입력 필요"      # 공공데이터포털 발급 API 키 (현재 DORO-BACK 코드는 미사용, 향후 수집기용 예약)
  tmap-app-key: "입력 필요"             # TMAP appKey — Web SDK/REST API 공용
