# redis-deployment.yaml
# 캐시 계층 Redis Deployment. DORO-Infra/redis_aws.yaml 기반이며, replica는 1개로 고정(단일 인스턴스).
# 네트워크 구성안(10.2)은 ElastiCache 관리형 Redis를 기준으로 하지만,
# 본 매니페스트는 클러스터 내부에서 직접 운용하는 Redis 컨테이너 구성이다.
# ElastiCache로 전환할 경우 이 Deployment/Service 대신 ElastiCache 엔드포인트를 REDIS_HOST로 사용한다.
#
# *** DORO-Infra/redis_aws.yaml 대비 수정한 부분 ***
# securityContext에 runAsUser/runAsNonRoot/fsGroup을 추가했다. 원본처럼 capabilities: drop ALL만 걸고
# non-root 지정을 안 하면, 공식 redis 이미지 entrypoint가 root로 시작해 /data를 chown하려다
# CAP_CHOWN이 없어 "chown: .: Operation not permitted"로 즉시 크래시(CrashLoopBackOff)한다.
# (로컬 docker-desktop 클러스터 테스트에서 실제로 재현·확인함 — EKS 노드에서도 동일 증상 발생 가능성 높음)
# uid/gid 999는 redis:7.2-alpine 이미지의 기본 redis 계정.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doro-redis
  namespace: default
  labels:
    app: doro-redis
    project: doro-load
    team: team-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doro-redis
  template:
    metadata:
      labels:
        app: doro-redis            # Service(doro-redis-service)가 이 라벨을 보고 트래픽을 전달
        project: doro-load
        team: team-a
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999                # emptyDir을 redis(gid 999)가 쓸 수 있도록 소유권 부여
      containers:
      - name: redis
        image: redis:7.2-alpine
        command: ["redis-server"]
        args: ["--requirepass", "$(REDIS_PASSWORD)"]
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        securityContext:
          runAsUser: 999             # non-root로 바로 실행 → entrypoint의 root 전용 chown 단계를 건너뜀
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: doro-secret     # secret.yaml의 metadata.name
              key: redis-password   # secret.yaml의 key와 일치
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 20
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}                 # Pod 재시작/삭제 시 캐시 데이터 소실. 영속성 필요 시 PVC(StorageClass 확정 후)로 교체
