# ingressclass.yaml
# 자체 설치(Helm) AWS Load Balancer Controller가 사용하는 IngressClass.
# Auto Mode 내장 컨트롤러(eks.amazonaws.com/alb, IngressClassParams)는 더 이상 쓰지 않는다 —
# scheme/subnet도 IngressClassParams가 아니라 backend-ingress.yaml의 Ingress annotation으로 선언한다.
# 사전 조건: kube-system에 aws-load-balancer-controller가 Helm으로 설치되어 있어야 이 클래스가 실제로 동작한다
# (IRSA 롤 생성 + OIDC provider 등록 + helm install 순서, 채팅 가이드 참고).

apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: ingress.k8s.aws/alb   # 자체 설치 컨트롤러 식별자 — Auto Mode의 eks.amazonaws.com/alb와 다름, 절대 혼용 금지
