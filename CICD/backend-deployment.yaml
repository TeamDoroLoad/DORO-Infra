# backend-deployment.yaml
# Private Application Layer에 배치되는 Spring Boot Web Service Deployment. DORO-Infra/deploy_aws.yaml 기반.
# Web API + Scheduler가 동일 애플리케이션에서 동작한다. replica는 1개로 고정.
#
# *** 이미지 교체 (CI 연동) ***
# image는 직접 채우지 않는다 — DORO-Service 저장소의 .github/workflows/service_deloy.yaml에서
#   1) build-and-push job: docker build -t $ECR_REGISTRY/team2/doroload:$IMAGE_TAG .   (IMAGE_TAG = github.sha) 후 ECR push
#   2) deploy-backend job: kubectl set image deployment/doro-app doro-app=$ECR_REGISTRY/team2/doroload:$IMAGE_TAG -n default
# 로 이 값을 주입한다. (IAM 사용자 cld-team2-doro-github-action이 이 클러스터의 EKS access entry로 등록되어 있어야 kubectl 명령이 동작함)
#
# *** Redis: ElastiCache로 전환 (2026-07-22) ***
# doro-redis Deployment/Service(자체 운영 Redis 컨테이너)는 더 이상 쓰지 않는다 — AWS가 관리하는
# ElastiCache 인스턴스로 교체됐고, 해당 인스턴스는 AUTH(비밀번호) 없이 접근 가능하므로
# SPRING_DATA_REDIS_PASSWORD env 자체가 필요 없다. REDIS_HOST/REDIS_PORT는 하드코딩 대신
# doro-secret(redis-host/redis-port 키)에서 주입한다 — ElastiCache 엔드포인트가 바뀌어도
# 이 매니페스트를 다시 배포할 필요 없이 AWS Secrets Manager 값만 갱신하면 되도록 하기 위함.
#
# *** doro-secret 출처: AWS Secrets Manager (Secrets Store CSI Driver) ***
# doro-secret은 더 이상 secret.yaml을 수동 apply해서 만들지 않는다. serviceaccount.yaml(IRSA) +
# secret-provider-class.yaml(SecretProviderClass)이 AWS Secrets Manager의 team2/doro-load/secrets를
# 읽어와 doro-secret K8s Secret으로 동기화한다. 아래 volumes의 CSI 마운트가 그 동기화를 트리거한다
# (파일 경로 자체는 이 Pod에서 안 쓰지만, 마운트가 있어야 doro-secret이 실제로 생성/갱신된다).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doro-app
  namespace: default
  labels:
    app: doro-app                 # Service selector가 매칭하는 라벨
    project: doro-load
    team: team-a
spec:
  replicas: 1                     # 요청에 따라 단일 Pod로 고정 (다중화 필요 시 증설)
  selector:
    matchLabels:
      app: doro-app                # 아래 template.metadata.labels와 반드시 일치해야 함
  template:
    metadata:
      labels:
        app: doro-app              # Service(doro-app-service)가 이 라벨을 보고 트래픽을 전달
        project: doro-load
        team: team-a
    spec:
      serviceAccountName: csi-secrets-store-provider-aws   # IRSA — AWS Secrets Manager 읽기 권한 (serviceaccount.yaml)
      automountServiceAccountToken: false   # 불필요한 K8s API 접근 차단 (IRSA 웹 아이덴티티 토큰과는 별개 메커니즘)
      # imagePullSecrets 불필요: AWS ECR 사용 — EKS 노드 IAM 역할(또는 IRSA)에
      # AmazonEC2ContainerRegistryReadOnly(또는 동등 커스텀 정책) 권한만 있으면 pull 가능
      containers:
      - name: doro-app
        image: IMAGE_REPO_PLACEHOLDER   # .github/workflows/service_deploy.yaml에서 kubectl set image로 교체됨
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
        resources:
          # 2026-07-23: 기동 시점 메모리 스파이크(Hibernate 메타모델 빌드 등)로 인한 OOMKilled 대응.
          # idle 시 실사용량은 약 427Mi — limit은 기동 스파이크를 흡수할 여유를 둔 값.
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "aws"                       # DORO-BACK엔 application-prod.yml이 없고 application-aws.yml만 있음

        # --- MySQL (AWS RDS 사용 확정 / doro-sg-rds, 3306) ---
        - name: DB_URL
          value: "jdbc:mysql://team2-doroload-mysql.cnqmcq6uwqa3.ap-northeast-2.rds.amazonaws.com:3306/doroload?serverTimezone=UTC&characterEncoding=UTF-8"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: mysql-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: mysql-password

        # --- Redis (AWS ElastiCache, AUTH 미사용 — 위 상단 주석 참고) ---
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: redis-port

        # --- CORS 허용 Origin (application-aws.yml의 doro.cors.allowed-origins) ---
        - name: WEB_ORIGIN
          value: "https://doro.beam0331.click"

        # --- 외부 데이터 API ---
        - name: PUBLIC_DATA_API_KEY
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: public-data-api-key
        - name: TMAP_APP_KEY
          valueFrom:
            secretKeyRef:
              name: doro-secret
              key: tmap-app-key
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "doro-secret-provider"
