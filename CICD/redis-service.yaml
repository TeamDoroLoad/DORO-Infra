# redis-service.yaml
# doro-redis Deployment를 클러스터 내부에 노출하는 Service. DORO-Infra/redis-service.yaml과 동일하다.
# backend-deployment.yaml에서는 REDIS_HOST=doro-redis-service로 접근한다.

apiVersion: v1
kind: Service
metadata:
  name: doro-redis-service
  namespace: default
  labels:
    app: doro-redis
    project: doro-load
    team: team-a
spec:
  type: ClusterIP                 # 클러스터 내부 전용 노출 (Redis는 외부 미노출)
  selector:
    app: doro-redis                # redis-deployment.yaml의 template.metadata.labels.app과 일치해야 트래픽 전달됨
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
