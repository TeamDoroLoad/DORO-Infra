# serviceaccount.yaml
# doro-app/doro-redis Pod가 AWS Secrets Manager의 시크릿을 읽기 위해 사용하는 IRSA(IAM Roles for
# Service Accounts) 연동 ServiceAccount.
#
# *** 사전 준비 (AWS 콘솔/CLI, 이미 완료됨 — 2026-07-22 확인) ***
# - IAM Role team2-doro-secret-iam-role 이미 생성됨, trust policy가 아래 sub와 정확히 일치해야 동작함:
#     system:serviceaccount:default:csi-secrets-store-provider-aws
#   (metadata.name/namespace를 바꾸면 trust policy도 같이 바꿔야 함)
# - IAM Policy team2-doro-secrets-read 연결됨 (secretsmanager:GetSecretValue/CreateSecret/PutSecretValue/UpdateSecret,
#   Resource: arn:aws:secretsmanager:ap-northeast-2:727646470302:secret:* — 계정 내 전체 시크릿 대상이라
#   team1 시크릿까지 포함하는 범위. 필요 시 "team2/*"로 좁히는 것을 권장, 이 파일 자체와는 무관한 후속 작업)
#
# 이 ServiceAccount는 secret-provider-class.yaml의 SecretProviderClass를 마운트하는
# backend-deployment.yaml / redis-deployment.yaml의 serviceAccountName으로 지정한다.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-secrets-store-provider-aws
  namespace: default
  labels:
    project: doro-load
    team: team-a
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::727646470302:role/team2-doro-secret-iam-role
