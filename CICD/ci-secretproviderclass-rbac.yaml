# ci-secretproviderclass-rbac.yaml
# GitHub Actions CI(IAM User cld-team2-doro-github-action → k8s user "team2-doro-gitaction-access")에
# 부여된 AmazonEKSEditPolicy는 AWS 관리형 정책이라 secrets-store.csi.x-k8s.io CRD(SecretProviderClass)를
# 포함하지 않는다 (2026-07-24 CI 실패로 실측: "cannot get resource secretproviderclasses"). CI가
# CICD/secret-provider-class.yaml을 apply하려면 이 리소스에 대한 권한이 별도로 필요하다.
#
# *** 이 파일은 CI가 스스로 적용할 수 없다 ***
# RBAC 부여는 권한 자기상승으로 이어질 수 있어 edit 정책에서 의도적으로 제외된 것으로 보인다.
# 따라서 이 매니페스트는 CI가 아니라 cluster-admin 권한이 있는 계정으로 최초 1회 수동 적용해야 한다.
# (kustomization.yaml에도 등록해두면, 이후 CI가 이 파일 자체를 재적용하려 할 때도 같은 이유로
# 실패할 수 있으니 kustomization.yaml/deploy-changed.yaml 목록에는 넣지 않는다.)

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-secretproviderclass-editor
  namespace: default
rules:
  - apiGroups:
      - secrets-store.csi.x-k8s.io
    resources:
      - secretproviderclasses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-secretproviderclass-editor-binding
  namespace: default
subjects:
  - kind: User
    name: team2-doro-gitaction-access
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ci-secretproviderclass-editor
  apiGroup: rbac.authorization.k8s.io
