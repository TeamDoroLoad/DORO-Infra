# kustomization.yaml
# DORO Load 백엔드 K8s 리소스를 한 번에 적용하기 위한 진입점.
#   kubectl apply -k CICD/
# 이후 이미지 갱신은 kustomize가 아니라 CI가 직접 실행한다 (아래 backend-deployment.yaml 상단 주석 참고):
#   kubectl set image deployment/doro-app doro-app=<ECR_REGISTRY>/team2/doroload:<git-sha> -n default
#
# *** 사전 준비 (AWS Secrets Manager 사용) ***
# doro-secret은 secret.yaml을 수동 apply하지 않고 Secrets Store CSI Driver가 AWS Secrets Manager
# (team2/doro-load/secrets)에서 읽어와 자동 생성한다. AWS 쪽에 시크릿이 먼저 존재해야 하고,
# serviceaccount.yaml의 IAM Role(team2-doro-secret-iam-role)이 미리 생성돼 있어야 한다
# (둘 다 이 리포는 건드리지 않는 AWS 리소스 — 2026-07-22 확인 시 IAM Role/Policy는 이미 있고
# Secrets Manager 시크릿 자체는 아직 생성 전).
# secret.example.yaml/secret.yaml 수동 경로는 로컬(docker-desktop) 테스트용으로만 남겨둔다.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - secret-provider-class.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - ingressclass.yaml
  - backend-ingress.yaml
  - backend-pdb.yaml
